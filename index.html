<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>家計簿アプリ｜クラシェルジュ</title>
<style>
:root{--b:#4AADCC;--tx:#333940;--txl:#6B7280;--bg:#F8FAFB;--cd:#fff;--bd:#E5E7EB;--g:#34A853;--gl:#E6F4EA;--r:#EA4335;--rl:#FFEAEA;--bl:#4285F4;--bll:#E8F0FE;--o:#FF9800;--ol:#FFF3E0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hiragino Sans','Noto Sans JP',-apple-system,sans-serif;background:var(--bg);color:var(--tx);max-width:520px;margin:0 auto;min-height:100vh}
button,input,textarea,select{font-family:inherit}
input[type=number]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}

/* ── Landing ── */
.land{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;text-align:center;background:linear-gradient(170deg,#f0f9fc,#fff 40%,#fefcf4)}
.land .logo{width:200px;margin-bottom:12px}
.land .chars{width:150px;margin-bottom:20px}
.land h1{font-size:21px;font-weight:700;line-height:1.5;margin-bottom:8px}
.land h1 span{color:var(--b)}
.land .desc{font-size:14px;color:var(--txl);line-height:1.8;margin-bottom:28px}
.sbtn{padding:15px 36px;background:var(--b);color:#fff;border:none;border-radius:60px;font-size:16px;font-weight:700;box-shadow:0 4px 20px rgba(74,173,204,.3);cursor:pointer}
.sbtn:active{transform:scale(.97)}
.lnbtn{display:inline-block;padding:11px 26px;background:#06C755;color:#fff;border:none;border-radius:60px;font-size:14px;font-weight:700;margin-top:14px;text-decoration:none;cursor:pointer}
.sns-row{display:flex;gap:16px;justify-content:center;align-items:center;margin-top:28px;flex-wrap:wrap}
.sns-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none}
.sns-item span{font-size:9px;color:var(--txl)}
.web-btn{display:flex;align-items:center;gap:8px;padding:8px 16px;border:1.5px solid var(--bd);border-radius:20px;text-decoration:none;background:var(--cd);margin-top:14px}
.web-btn img{height:28px;width:auto}
.web-btn span{font-size:12px;color:var(--txl);font-weight:500}

/* ── Setup ── */
.setup-pg{display:none;min-height:100vh;background:var(--bg)}
.setup-inner{max-width:400px;margin:0 auto;padding:40px 24px;text-align:center}
.sq{margin-bottom:18px;text-align:left}
.sq label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
.sq select{width:100%;padding:10px;border:1px solid var(--bd);border-radius:8px;font-size:15px;outline:none}
.sq select:focus{border-color:var(--b)}
.regions{display:flex;flex-wrap:wrap;gap:6px}
.regions button{padding:7px 12px;border:1.5px solid var(--bd);border-radius:8px;background:var(--cd);font-size:12px;color:var(--txl);cursor:pointer}
.regions button.on{border-color:var(--b);background:var(--bll);color:var(--b);font-weight:700}

/* ── App shell ── */
.app{display:none}
.app.show{display:block}
.hd{background:var(--cd);padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd)}
.hd .bk{background:none;border:none;font-size:18px;color:var(--txl);padding:4px;cursor:pointer}
.hd .ls{height:20px}.hd .cs{height:26px;margin-left:auto}
.nav{display:flex;background:var(--cd);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10}
.nav button{flex:1;padding:10px 2px;border:none;background:var(--cd);font-size:11px;color:var(--txl);border-bottom:2px solid transparent;cursor:pointer}
.nav button.on{color:var(--b);font-weight:700;border-bottom-color:var(--b)}
.pg{padding:16px;min-height:60vh}

/* ── Calendar ── */
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.ch .mo{font-size:17px;font-weight:700}
.ch button{background:none;border:1px solid var(--bd);border-radius:8px;padding:6px 12px;font-size:14px;cursor:pointer}
.cs3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.cs3>div{background:var(--cd);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--bd)}
.cs3 .l{font-size:10px;color:var(--txl);margin-bottom:2px}.cs3 .v{font-size:16px;font-weight:700}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:14px}
.cg .dw{font-size:10px;color:var(--txl);text-align:center;padding:4px 0;font-weight:600}
.cg .dy{background:var(--cd);border-radius:6px;padding:5px 2px;text-align:center;min-height:50px;border:1px solid var(--bd);cursor:pointer}
.cg .dy:active{background:var(--bll)}.cg .dy.td{border-color:var(--b);box-shadow:0 0 0 1px var(--b)}.cg .dy.has{background:#f0fdf4}
.cg .dy .dn{font-size:11px;font-weight:600;margin-bottom:2px}.cg .dy .da{font-size:10px;color:var(--txl)}.cg .dy .da.neg{color:var(--r)}
.cg .em{min-height:50px}

/* ── Modal ── */
.mbg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.mdl{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;padding:20px 16px 40px}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mh h2{font-size:16px;font-weight:700}.mh button{background:none;border:none;font-size:22px;color:var(--txl);padding:4px;cursor:pointer}
.ei{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f3f4f6}
.ei .en{flex:1;font-size:13px}.ei .ea{font-size:14px;font-weight:600;min-width:70px;text-align:right}
.ei .ea.inc{color:var(--g)}.ei .ed{background:none;border:none;font-size:14px;color:#ccc;padding:4px;cursor:pointer}
.ei .ed:active{color:var(--r)}
.qa{margin-top:14px;background:var(--cd);border-radius:10px;padding:12px;border:1px solid var(--bd)}
.qa .ql{font-size:11px;font-weight:600;margin-bottom:6px}
.qa .qt-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;align-items:center}
.qa .qt{padding:5px 10px;border:1px solid var(--bd);border-radius:14px;font-size:12px;background:var(--cd);cursor:pointer;color:var(--txl)}
.qa .qt.on{background:var(--bll);border-color:var(--b);color:var(--b);font-weight:600}
.qa .qt-edit{padding:3px 8px;border:1px dashed var(--bd);border-radius:14px;font-size:11px;background:none;color:var(--txl);cursor:pointer}
.qa .amt-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.qa .amt-row input{flex:1;padding:10px;border:1px solid var(--bd);border-radius:8px;font-size:16px;text-align:right;outline:none}
.qa .amt-row input:focus{border-color:var(--b)}
.qa .amt-row .abtn{padding:10px 16px;background:var(--b);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer}
.tag-edit{margin-top:8px;background:var(--bg);border-radius:8px;padding:10px;border:1px solid var(--bd)}
.tag-edit .te-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.tag-edit .te-row span{flex:1;font-size:12px}
.tag-edit .te-row button{background:none;border:none;color:#ccc;font-size:14px;cursor:pointer}
.tag-edit .te-add{display:flex;gap:6px;margin-top:6px}
.tag-edit .te-add input{flex:1;padding:5px 8px;border:1px solid var(--bd);border-radius:6px;font-size:12px;outline:none}
.tag-edit .te-add button{padding:5px 10px;background:var(--b);color:#fff;border:none;border-radius:6px;font-size:11px;white-space:nowrap;cursor:pointer}

/* ── Fixed ── */
.fxsec{background:var(--cd);border-radius:10px;border:1px solid var(--bd);margin-bottom:14px;overflow:hidden}
.fxhd{display:flex;align-items:center;padding:10px 14px;cursor:pointer;gap:8px}
.fxhd .ft{font-size:14px;font-weight:600;flex:1}.fxhd .fa{font-size:14px;font-weight:700;color:var(--b)}.fxhd .fc{font-size:14px;color:var(--txl);transition:transform .2s}
.fxhd .fc.open{transform:rotate(180deg)}
.fxbd{border-top:1px solid var(--bd);padding:10px 14px}
.fi{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #f3f4f6}
.fi:last-child{border-bottom:none}.fi .fn{flex:1;font-size:13px}
.fi input{width:80px;padding:6px;border:1px solid var(--bd);border-radius:6px;text-align:right;font-size:13px;outline:none}
.fi input:focus{border-color:var(--b)}
.fi .fdl{background:none;border:none;font-size:14px;color:#ccc;padding:2px;cursor:pointer}.fi .fdl:active{color:var(--r)}
.af{display:flex;gap:6px;margin-top:8px}
.af input{flex:1;padding:6px;border:1px solid var(--bd);border-radius:6px;font-size:12px;outline:none;min-width:0}
.af button{padding:6px 10px;background:var(--b);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer}

/* ── Utility ── */
.uc{background:var(--cd);border-radius:10px;border:1px solid var(--bd);padding:14px;margin-bottom:14px}
.uc h3{font-size:14px;font-weight:600;margin-bottom:10px}
.ur{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ur .ul{font-size:13px;flex:1}
.ur input{width:80px;padding:6px;border:1px solid var(--bd);border-radius:6px;text-align:right;font-size:13px;outline:none}
.ur input:focus{border-color:var(--b)}
.ur input.warn{border-color:var(--r);background:var(--rl)}
.uavg{font-size:10px;color:var(--txl);margin-top:2px}
.uwarn{color:var(--r);font-weight:700}

/* ── Savings ── */
.tin{width:56px;padding:4px;border:1px solid var(--bd);border-radius:4px;text-align:right;font-size:12px;outline:none}
.tin:focus{border-color:var(--b)}

/* ── Footer ── */
.ftb{padding:16px;text-align:center;background:var(--cd);border-top:1px solid var(--bd)}
.ftb .rst{padding:8px 20px;border:1px solid var(--bd);border-radius:8px;background:var(--cd);color:var(--txl);font-size:12px;cursor:pointer}
.ftb .fl{margin-top:10px;font-size:11px;color:#bbb}.ftb a{text-decoration:none}
/* Tutorial */
.tut-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
.tut{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:24px 20px 20px;animation:tutSlide .3s ease-out}
@keyframes tutSlide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.tut-head{display:flex;align-items:flex-end;gap:12px;margin-bottom:16px}
.tut-head img{width:110px;height:auto;flex-shrink:0;margin-bottom:-10px;filter:drop-shadow(0 2px 8px rgba(74,173,204,.18))}
.tut-bubble{flex:1;background:var(--cd);border-radius:14px 14px 14px 0;padding:12px 14px;border:1px solid var(--bd);position:relative}
.tut-bubble .tn{font-size:10px;font-weight:600;color:var(--b);margin-bottom:4px}
.tut-bubble .tm{font-size:13px;line-height:1.7;color:var(--tx);white-space:pre-line}
.tut-actions{display:flex;gap:10px;align-items:center;margin-top:8px}
.tut-actions .tut-skip{flex:1;padding:11px;background:none;border:1px solid var(--bd);color:var(--txl);border-radius:10px;font-size:13px;cursor:pointer}
.tut-actions .tut-next{flex:2;padding:11px;background:var(--b);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(74,173,204,.25)}
.tut-actions .tut-next:active{transform:scale(.97)}
.tut-progress{display:flex;justify-content:center;gap:5px;margin-top:14px}
.tut-progress span{width:7px;height:7px;border-radius:50%;background:var(--bd)}
.tut-progress span.on{background:var(--b);width:22px;border-radius:4px}
</style>
</head>

function getGreeting(){
  const h=new Date().getHours();
  const g=GREETINGS.find(x=>h>=x.h[0]&&h<x.h[1])||GREETINGS[4];
  return{img:CHAR[g.img],pose:g.img,msg:g.msgs[Math.floor(Math.random()*g.msgs.length)]};
}

function getAvg(mo){
  if(!D||!D.setup)return{elec:BASE_ELEC[mo],gas:BASE_GAS[mo],water:BASE_WATER[mo]};
  const s=D.setup;
  const sm=SIZE_MULT[Math.min((s.size||2)-1,3)];
  const rm=REGION_MULT[REGIONS.indexOf(s.region)]||1.0;
  let elec=Math.round(BASE_ELEC[mo]*sm*rm);
  let gas=Math.round(BASE_GAS[mo]*sm*rm);
  let water=Math.round(BASE_WATER[mo]*sm);
  if(s.type==='allelectric'){elec=Math.round(elec*1.6);gas=0}
  if(s.type==='propane'){gas=Math.round(gas*1.4)}
  return{elec,gas,water};
}

function getMonthScore(yr,mo){
  const dim=new Date(yr,mo+1,0).getDate();
  let days=0,totInc=0,totExp=0;
  for(let d=1;d<=dim;d++){
    const ents=D.entries[dk(yr,mo,d)]||[];
    if(ents.length)days++;
    ents.forEach(e=>{if(e.t==='inc')totInc+=+e.a||0;else totExp+=+e.a||0});
  }
  const rate=days/dim;
  const uk=`${yr}-${mo}`;const ut=D.util[uk]||{};
  const utT=(+ut.eC||0)+(+ut.gC||0)+(+ut.wC||0);
  const ft=fxTotal();const totalExp=totExp+ft+utT;
  const bal=totInc-totalExp;
  let score=Math.round(rate*60);
  if(bal>0)score+=30;else if(bal>-10000)score+=15;
  score=Math.min(100,Math.max(0,score));
  return{score,days,dim,rate,bal};
}
function getScoreExpr(s){return s>=80?'happy':s>=50?'excited':s>=30?'think':'present'}

function showSetup(){

function openApp(){
  document.getElementById('landing').style.display='none';

  const now=new Date();YR=now.getFullYear();MO=now.getMonth();if(!SUM_YR)SUM_YR=YR;

  try{tutDone=localStorage.getItem(TUT_KEY)==='1'}catch{}

}

function render(){
  document.getElementById('nav').innerHTML=TABS.map((t,i)=>`<button class="${i===TAB?'on':''}" onclick="TAB=${i};render()">${t}</button>`).join('');
  const pg=document.getElementById('pg');
  if(TAB===0)renderCal(pg);
  else if(TAB===1)renderFixed(pg);
  else if(TAB===2)renderUtil(pg);
  else if(TAB===3)renderSav(pg);
  else renderSum(pg);
}

function renderCal(pg){
  const dim=new Date(YR,MO+1,0).getDate(),fdow=new Date(YR,MO,1).getDay();
  const now=new Date(),tdk=dk(now.getFullYear(),now.getMonth(),now.getDate());
  const isEnd=now.getDate()>=28&&now.getFullYear()===YR&&now.getMonth()===MO;
  let mI=0,mE=0,mHasEntry=false;
  for(let d=1;d<=dim;d++){const ents=D.entries[dk(YR,MO,d)]||[];if(ents.length)mHasEntry=true;ents.forEach(e=>{if(e.t==='inc')mI+=+e.a||0;else mE+=+e.a||0})}
  const uk=`${YR}-${MO}`,ut=D.util[uk]||{},utT=(+ut.eC||0)+(+ut.gC||0)+(+ut.wC||0);
  const mActive=mHasEntry||utT>0||mI>0;
  const ft=mActive?fxTotal():0;
  const tE=mE+ft+utT,bal=mI-tE;
  const gr=getGreeting();
  const sc=isEnd?getMonthScore(YR,MO):null;
  const cardImg=sc?CHAR[getScoreExpr(sc.score)]:CHAR[gr.pose];

  let s='<div style="background:linear-gradient(135deg,#f0f9fc,#fefcf4);border-radius:16px;margin-bottom:14px;border:1px solid var(--bd);overflow:hidden">';
  s+='<div style="display:flex;align-items:flex-end;gap:10px;padding:14px 14px 0">';
  s+=`<img src="${cardImg}" style="width:100px;height:auto;flex-shrink:0;margin-bottom:-4px;filter:drop-shadow(0 2px 8px rgba(74,173,204,.15))">`;
  s+='<div style="flex:1;padding-bottom:14px">';
  if(sc){
    s+=`<div style="font-size:10px;font-weight:600;color:var(--b);margin-bottom:4px">${MO+1}月の家計スコア</div>`;
    s+=`<div style="font-size:40px;font-weight:900;line-height:1;color:${sc.score>=70?'var(--b)':sc.score>=40?'var(--o)':'var(--r)'}">`;
    s+=`${sc.score}<span style="font-size:16px;font-weight:600">点</span></div>`;
    s+=`<div style="font-size:11px;color:var(--txl);margin-top:2px">記録率 ${Math.round(sc.rate*100)}%（${sc.days}/${sc.dim}日）</div>`;
  }else{
    s+=`<div style="font-size:10px;font-weight:600;color:var(--b);margin-bottom:4px">倉橋アンナ より</div>`;
    s+=`<div style="background:var(--cd);border-radius:12px 12px 12px 0;padding:10px 14px;border:1px solid var(--bd)"><div style="font-size:12px;line-height:1.7;color:var(--tx)">${gr.msg}</div></div>`;
  }

  s+=`<div class="ch"><button onclick="MO--;if(MO<0){MO=11;YR--}render()">◀</button><div class="mo">${YR}年${MO+1}月</div><button onclick="MO++;if(MO>11){MO=0;YR++}render()">▶</button></div>`;
  s+=`<div class="cs3"><div><div class="l">収入</div><div class="v" style="color:var(--g)">${fmt(mI)}</div></div><div><div class="l">支出</div><div class="v">${fmt(tE)}</div></div><div><div class="l">収支</div><div class="v" style="color:${bal>=0?'var(--b)':'var(--r)'}">${fmt(bal)}</div></div></div>`;

// ========== DAY MODAL ==========
function openDay(d){SEL_TAG={inc:null,exp:null};EDIT_TAGS=null;document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,d)}
function closeMdl(){document.getElementById('mr').innerHTML='';render()}

function renderMdlHTML(yr,mo,d){
  const key=dk(yr,mo,d),ents=D.entries[key]||[];
  const dow=DOWS[new Date(yr,mo,d).getDay()];
  let s=`<div class="mbg" onclick="if(event.target===this)closeMdl()"><div class="mdl">`;
  s+=`<div class="mh"><h2>${mo+1}/${d}（${dow}）</h2><button onclick="closeMdl()">✕</button></div>`;
  if(ents.length){
    ents.forEach((e,i)=>{
      if(EDIT_ENTRY&&EDIT_ENTRY.key===key&&EDIT_ENTRY.idx===i){
        // Edit mode for this entry
        s+=`<div class="ei" style="flex-wrap:wrap;gap:4px;padding:8px 0">`;
        s+=`<div class="en" style="font-size:11px;color:var(--txl);width:100%;margin-bottom:2px">${e.n}を編集</div>`;
        s+=`<select id="editType_${i}" style="padding:6px;border:1px solid var(--bd);border-radius:6px;font-size:13px;flex-shrink:0">`;
        s+=`<option value="exp"${e.t==='exp'?' selected':''}>支出</option>`;
        s+=`<option value="inc"${e.t==='inc'?' selected':''}>収入</option>`;
        s+=`</select>`;
        s+=`<input id="editAmt_${i}" type="number" inputmode="numeric" value="${e.a}" style="flex:1;padding:6px;border:1px solid var(--bd);border-radius:6px;font-size:14px;text-align:right;outline:none;min-width:60px">`;
        s+=`<button style="padding:6px 12px;background:var(--b);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer" onclick="saveEditE('${key}',${i})">保存</button>`;
        s+=`<button style="padding:6px 10px;background:none;border:1px solid var(--bd);border-radius:6px;font-size:12px;cursor:pointer" onclick="EDIT_ENTRY=null;document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,${parseInt(key.split('-')[2])})">取消</button>`;
        s+=`</div>`;
      }else{
        s+=`<div class="ei"><div class="en">${e.n}</div><div class="ea${e.t==='inc'?' inc':''}">${e.t==='inc'?'+':'−'}${fmt(e.a)}</div>`;
        s+=`<button style="background:none;border:none;color:var(--b);font-size:11px;padding:4px 6px;cursor:pointer;border-radius:4px;border:1px solid var(--b)" onclick="startEditE('${key}',${i})">編集</button>`;
        s+=`<button class="ed" onclick="delE('${key}',${i})">✕</button></div>`;
      }
    });
  }else{
    s+='<div style="text-align:center;padding:16px 0;color:var(--txl);font-size:13px">まだ記録がありません</div>';
  }
  s+='<div class="qa">';
  ['inc','exp'].forEach(type=>{
    const lbl=type==='inc'?'収入':'支出';
    const col=type==='inc'?'var(--g)':'var(--o)';
    s+=`<div class="ql" style="color:${col};margin-top:${type==='exp'?'10px':'0'}">${lbl}</div><div class="qt-wrap">`;
    D.cats[type].forEach((c,i)=>{
      const on=SEL_TAG[type]===c;
      s+=`<div class="qt${on?' on':''}" onclick="selTag('${type}','${c}')" style="${on?'border-color:'+col+';color:'+col:''}">${c}</div>`;
    });
    s+=`<button class="qt-edit" onclick="toggleEditTags('${type}')">✎</button></div>`;
    if(EDIT_TAGS===type){
      s+='<div class="tag-edit">';
      D.cats[type].forEach((c,i)=>{
        s+=`<div class="te-row"><span>${c}</span><button onclick="delCat('${type}',${i})">✕</button></div>`;
      });
      s+=`<div class="te-add"><input id="newCat_${type}" placeholder="カテゴリ追加"><button onclick="addCat('${type}')">追加</button></div></div>`;
    }
  });
  s+=`<div class="amt-row"><input id="addAmt" type="number" inputmode="numeric" placeholder="金額を入力" onfocus="this.select()"><button class="abtn" onclick="doAdd('${key}')">記録する</button></div>`;
  s+='</div></div></div>';
  return s;
}

function selTag(t,n){SEL_TAG[t]=SEL_TAG[t]===n?null:n;const o=t==='inc'?'exp':'inc';SEL_TAG[o]=null;document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,parseInt(document.querySelector('.mh h2').textContent))}
function toggleEditTags(t){EDIT_TAGS=EDIT_TAGS===t?null:t;document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,parseInt(document.querySelector('.mh h2').textContent))}
function delCat(t,i){D.cats[t].splice(i,1);sv();document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,parseInt(document.querySelector('.mh h2').textContent))}
function addCat(t){const el=document.getElementById('newCat_'+t);const v=el.value.trim();if(!v)return;D.cats[t].push(v);sv();document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,parseInt(document.querySelector('.mh h2').textContent))}
function doAdd(key){
  const type=SEL_TAG.inc?'inc':SEL_TAG.exp?'exp':null;
  const name=SEL_TAG.inc||SEL_TAG.exp;
  const amt=+document.getElementById('addAmt').value;
  if(!type||!name){alert('カテゴリを選んでください');return}
  if(!amt){alert('金額を入力してください');return}
  if(!D.entries[key])D.entries[key]=[];
  D.entries[key].push({t:type,n:name,a:amt});
  sv();SEL_TAG={inc:null,exp:null};
  const d=parseInt(key.split('-')[2]);
  document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,d);
}
function delE(key,i){D.entries[key].splice(i,1);if(!D.entries[key].length)delete D.entries[key];sv();const d=parseInt(key.split('-')[2]);EDIT_ENTRY=null;document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,d)}
function startEditE(key,i){EDIT_ENTRY={key,idx:i};SEL_TAG={inc:null,exp:null};const d=parseInt(key.split('-')[2]);document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,d)}
function saveEditE(key,i){
  const typeEl=document.getElementById('editType_'+i);
  const amtEl=document.getElementById('editAmt_'+i);
  if(!typeEl||!amtEl)return;
  const newAmt=+amtEl.value;
  if(!newAmt){alert('金額を入力してください');return}
  D.entries[key][i].t=typeEl.value;
  D.entries[key][i].a=newAmt;
  sv();EDIT_ENTRY=null;
  const d=parseInt(key.split('-')[2]);
  document.getElementById('mr').innerHTML=renderMdlHTML(YR,MO,d);
}

  if(FX_OPEN){
    s+='<div class="fxbd">';
    (D.fixed||[]).forEach((f,i)=>{
      s+=`<div class="fi"><div class="fn">${f.n}</div><input type="number" value="${f.a||''}" placeholder="0" onchange="D.fixed[${i}].a=+this.value||0;sv()"><button class="fdl" onclick="delFx(${i})">✕</button></div>`;

  }

function delFx(i){if(confirm(D.fixed[i].n+'を削除？')){D.fixed.splice(i,1);sv();renderFixed(document.getElementById('pg'))}}
function addFx(){const n=document.getElementById('nfn').value.trim(),a=+document.getElementById('nfa').value;if(!n)return;D.fixed.push({n,a:a||0});sv();renderFixed(document.getElementById('pg'))}

// ========== UTILITY ==========
function renderUtil(pg){
  const uk=`${YR}-${MO}`;if(!D.util[uk])D.util[uk]={};const ut=D.util[uk];
  const avg=getAvg(MO);
  const eW=(+ut.eC||0)>0&&(+ut.eC||0)>avg.elec;
  const gW=(+ut.gC||0)>0&&avg.gas>0&&(+ut.gC||0)>avg.gas;
  const wW=(+ut.wC||0)>0&&(+ut.wC||0)>avg.water;
  const total=(+ut.eC||0)+(+ut.gC||0)+(+ut.wC||0);

  let s=`<div class="ch"><button onclick="MO--;if(MO<0){MO=11;YR--}renderUtil(document.getElementById('pg'))">◀</button><div class="mo">${YR}年${MO+1}月</div><button onclick="MO++;if(MO>11){MO=0;YR++}renderUtil(document.getElementById('pg'))">▶</button></div>`;

  s+='<div class="uc"><h3>⚡ 電気</h3>';
  s+='<div class="ur"><div class="ul">使用量 (kWh)</div><input type="number" value="'+(ut.eU||'')+'" onchange="updUt(\'eU\',this.value)"></div>';
  s+='<div class="ur"><div class="ul">金額</div><input type="number" value="'+(ut.eC||'')+'" class="'+(eW?'warn':'')+'" onchange="updUt(\'eC\',this.value)"></div>';
  s+=`<div class="uavg">${MO+1}月の平均: ${fmt(avg.elec)}円${eW?'<span class="uwarn">　▲ 平均超過 (+'+fmt((+ut.eC||0)-avg.elec)+'円)</span>':''}</div></div>`;

  if(avg.gas>0){
    s+='<div class="uc"><h3>🔥 ガス</h3>';
    s+='<div class="ur"><div class="ul">使用量 (m³)</div><input type="number" value="'+(ut.gU||'')+'" onchange="updUt(\'gU\',this.value)"></div>';
    s+='<div class="ur"><div class="ul">金額</div><input type="number" value="'+(ut.gC||'')+'" class="'+(gW?'warn':'')+'" onchange="updUt(\'gC\',this.value)"></div>';
    s+=`<div class="uavg">${MO+1}月の平均: ${fmt(avg.gas)}円${gW?'<span class="uwarn">　▲ 平均超過 (+'+fmt((+ut.gC||0)-avg.gas)+'円)</span>':''}</div></div>`;
  }else{
    s+='<div class="uc" style="opacity:.5"><h3>🔥 ガス（オール電化のため対象外）</h3></div>';
  }

  s+='<div class="uc"><h3>💧 水道</h3>';
  s+='<div class="ur"><div class="ul">使用量 (m³)</div><input type="number" value="'+(ut.wU||'')+'" onchange="updUt(\'wU\',this.value)"></div>';
  s+='<div class="ur"><div class="ul">金額</div><input type="number" value="'+(ut.wC||'')+'" class="'+(wW?'warn':'')+'" onchange="updUt(\'wC\',this.value)"></div>';
  s+=`<div class="uavg">${MO+1}月の平均: ${fmt(avg.water)}円${wW?'<span class="uwarn">　▲ 平均超過 (+'+fmt((+ut.wC||0)-avg.water)+'円)</span>':''}</div></div>`;

  s+=`<div style="background:var(--cd);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--bd)"><div style="font-size:12px;color:var(--txl)">今月の光熱費合計</div><div style="font-size:20px;font-weight:700;color:var(--b)">${fmt(total)}円</div></div>`;

  if(D.setup){
    s+=`<div style="font-size:11px;color:var(--txl);margin-top:10px;text-align:center">比較基準: ${D.setup.size}人世帯・${D.setup.region}・${D.setup.type==='city'?'都市ガス':D.setup.type==='propane'?'プロパン':'オール電化'}</div>`;
  }
  pg.innerHTML=s;
}
function updUt(f,v){
  if(!document.activeElement||document.activeElement.tagName!=='INPUT'){
    const uk=`${YR}-${MO}`;if(!D.util[uk])D.util[uk]={};D.util[uk][f]=+v||0;sv();
    renderUtil(document.getElementById('pg'));return;
  }
  // Save the active input position
  const uk=`${YR}-${MO}`;if(!D.util[uk])D.util[uk]={};D.util[uk][f]=+v||0;sv();
  // Re-render but try to maintain focus
  const activeOnChange=document.activeElement.getAttribute('onchange');
  renderUtil(document.getElementById('pg'));
  if(activeOnChange){
    const inputs=document.querySelectorAll('#pg input');
    for(const inp of inputs){
      if(inp.getAttribute('onchange')===activeOnChange){inp.focus();inp.select();break}
    }
  }
}

// ========== SAVINGS ==========
function renderSav(pg){
  if(!D.savAccs)D.savAccs=['普通預金①','普通預金②','定期預金','証券口座','学資保険','その他'];
  if(!D.savData)D.savData={};
  const sa=D.savAccs,sd=D.savData;
  const rows=['前年度末',...MS];
  const gT=rk=>sa.reduce((s,_,i)=>s+(sd[rk]&&sd[rk][i]?+sd[rk][i]:0),0);

  let s='<div style="font-size:15px;font-weight:700;margin-bottom:4px">貯蓄残高の推移</div>';
  s+='<div style="font-size:12px;color:var(--txl);margin-bottom:14px">月末の口座残高を記録できます</div>';

  s+='<div style="background:var(--cd);border-radius:10px;border:1px solid var(--bd);padding:12px 14px;margin-bottom:14px" id="acctMgr">';
  s+='<div style="font-size:12px;font-weight:600;color:var(--txl);margin-bottom:10px">口座の管理（名前変更・削除）</div>';
  sa.forEach(function(a,i){
    s+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f3f4f6">';
    s+='<textarea data-rename="'+i+'" rows="1" style="flex:1;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;font-size:13px;outline:none;min-width:0;resize:vertical;font-family:inherit;line-height:1.4;min-height:36px">'+a.replace(/</g,"&lt;")+'</textarea>';
    s+='<button type="button" data-del="'+i+'" style="padding:8px 16px;background:#FFEBEE;border:1.5px solid #EF5350;color:#D32F2F;font-size:13px;font-weight:700;border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0">削除</button>';
    s+='</div>';
  });
  s+='<button type="button" data-add="1" style="margin-top:10px;padding:10px 16px;border:1.5px dashed var(--b);border-radius:8px;font-size:13px;background:none;color:var(--b);cursor:pointer;font-weight:600;width:100%">＋ 新しい口座を追加</button>';
  s+='</div>';

  s+='<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--bd)"><table style="border-collapse:collapse;font-size:12px;background:var(--cd);width:100%">';
  s+='<thead><tr style="background:var(--bl);color:#fff"><th style="padding:6px;white-space:nowrap"></th>';
  sa.forEach(a=>s+=`<th style="padding:4px;font-size:10px;min-width:60px;white-space:pre-line;line-height:1.3">${a}</th>`);
  s+='<th style="padding:6px;min-width:56px">合計</th><th style="padding:6px;min-width:56px">前月比</th></tr></thead><tbody>';

  rows.forEach((rk,ri)=>{
    const t=gT(rk),pt=ri>0?gT(rows[ri-1]):0,diff=ri>0?t-pt:null;
    s+=`<tr style="${rk==='前年度末'?'background:var(--ol)':''}"><td style="font-weight:600;padding:5px;white-space:nowrap">${rk}</td>`;
    sa.forEach((_,i)=>{
      const val=sd[rk]&&sd[rk][i]?sd[rk][i]:'';
      s+=`<td style="padding:2px"><input class="tin" type="number" value="${val}" onchange="updSav('${rk}',${i},this.value)"></td>`;
    });
    s+=`<td style="font-weight:700;padding:5px;background:#f9f9f9;text-align:right">${fmt(t)}</td>`;
    const dc=diff!==null&&diff<0?'var(--r)':'var(--g)';
    s+=`<td style="font-weight:600;padding:5px;text-align:right;color:${dc}">${diff!==null?(diff>=0?'+':'')+fmt(diff):'-'}</td></tr>`;
  });
  s+='</tbody></table></div>';

  const yearDiff=gT('12月')-gT('前年度末');
  const yc=yearDiff>=0?'var(--b)':'var(--r)';
  s+=`<div style="background:var(--cd);border-radius:10px;padding:12px;text-align:center;margin-top:14px;border:1px solid var(--bd)"><div style="font-size:12px;color:var(--txl)">年間の資産増減</div><div data-yd style="font-size:20px;font-weight:700;color:${yc}">${yearDiff>=0?'+':''}${fmt(yearDiff)}円</div></div>`;

  pg.innerHTML=s;
  // Attach event listeners via delegation (bulletproof against inline onclick issues)
  const mgr=document.getElementById('acctMgr');
  if(mgr){
    mgr.addEventListener('click',function(ev){
      const t=ev.target;
      if(t.tagName!=='BUTTON')return;
      const delIdx=t.getAttribute('data-del');
      const addBtn=t.getAttribute('data-add');
      if(delIdx!==null){
        ev.preventDefault();ev.stopPropagation();
        delSavAcc(parseInt(delIdx,10));
      }else if(addBtn){
        ev.preventDefault();ev.stopPropagation();
        addSavAcc();
      }
    });
    mgr.addEventListener('change',function(ev){
      const t=ev.target;
      if(t.tagName!=='INPUT'&&t.tagName!=='TEXTAREA')return;
      const ri=t.getAttribute('data-rename');
      if(ri!==null)renameSavAcc(parseInt(ri,10),t.value);
    });
    // Also save on blur (in case user just clicks away)
    mgr.addEventListener('blur',function(ev){
      const t=ev.target;
      if(t.tagName!=='TEXTAREA')return;
      const ri=t.getAttribute('data-rename');
      if(ri!==null)renameSavAcc(parseInt(ri,10),t.value);
    },true);
  }
}
function updSav(rk,i,v){
  if(!D.savData[rk])D.savData[rk]={};
  D.savData[rk][i]=+v||0;
  sv();
  updateSavTotals();
}
function updateSavTotals(){
  if(!D.savAccs||TAB!==3)return;
  const sa=D.savAccs,sd=D.savData||{};
  const rows=['前年度末',...MS];
  const gT=rk=>sa.reduce((s,_,i)=>s+(sd[rk]&&sd[rk][i]?+sd[rk][i]:0),0);
  // Update each row's total and diff cells
  const tbody=document.querySelector('#pg tbody');
  if(!tbody)return;
  Array.from(tbody.children).forEach((tr,ri)=>{
    const rk=rows[ri];
    const t=gT(rk);
    const pt=ri>0?gT(rows[ri-1]):0;
    const diff=ri>0?t-pt:null;
    const cells=tr.children;
    if(cells.length>=2){
      cells[cells.length-2].textContent=fmt(t);
      const dc=diff!==null&&diff<0?'#EA4335':'#34A853';
      cells[cells.length-1].style.color=dc;
      cells[cells.length-1].textContent=diff!==null?((diff>=0?'+':'')+fmt(diff)):'-';
    }
  });
  // Update year diff card
  const yd=gT('12月')-gT('前年度末');
  const ydEl=document.querySelector('#pg [data-yd]');
  if(ydEl){
    ydEl.textContent=(yd>=0?'+':'')+fmt(yd)+'円';
    ydEl.style.color=yd>=0?'var(--b)':'var(--r)';
  }
}
function renameSavAcc(i,v){if(D.savAccs&&i<D.savAccs.length){D.savAccs[i]=v;sv();
  // Update table header to reflect rename immediately
  const ths=document.querySelectorAll('#pg table thead th');
  if(ths&&ths[i+1]){ths[i+1].textContent=v}
}}
function addSavAcc(){if(!D.savAccs)D.savAccs=[];D.savAccs.push('新規口座');sv();renderSav(document.getElementById('pg'))}
let _delConfirm=null;
function delSavAcc(i){
  if(!D||!D.savAccs)return;
  if(i<0||i>=D.savAccs.length)return;
  // Two-tap confirmation: first tap shows confirm state, second tap deletes
  if(_delConfirm!==i){
    _delConfirm=i;
    // Update the button to show confirmation
    const btn=document.querySelector('button[data-del="'+i+'"]');
    if(btn){
      btn.textContent='もう一度押して削除';
      btn.style.background='#D32F2F';
      btn.style.color='#fff';
      btn.style.borderColor='#D32F2F';
      // Reset after 3 seconds if not confirmed
      setTimeout(function(){
        if(_delConfirm===i){
          _delConfirm=null;
          const b=document.querySelector('button[data-del="'+i+'"]');
          if(b){b.textContent='削除';b.style.background='#FFEBEE';b.style.color='#D32F2F';b.style.borderColor='#EF5350'}
        }
      },3000);
    }
    return;
  }
  // Confirmed - actually delete
  _delConfirm=null;
  D.savAccs.splice(i,1);
  // Shift savData indexes
  if(D.savData){
    Object.keys(D.savData).forEach(function(rk){
      const row=D.savData[rk];
      if(!row)return;
      const newRow={};
      Object.keys(row).forEach(function(k){
        const ki=parseInt(k,10);
        if(ki<i)newRow[ki]=row[ki];
        else if(ki>i)newRow[ki-1]=row[ki];
      });
      D.savData[rk]=newRow;
    });
  }
  sv();
  renderSav(document.getElementById('pg'));
}

// ========== SUMMARY ==========
function renderSum(pg){
  if(!SUM_YR)SUM_YR=YR;
  const rows=[];
  for(let mo=0;mo<12;mo++){
    const dim=new Date(SUM_YR,mo+1,0).getDate();let inc=0,varExp=0,hasEntry=false;
    for(let d=1;d<=dim;d++){
      const ents=D.entries[dk(SUM_YR,mo,d)]||[];
      if(ents.length)hasEntry=true;
      ents.forEach(e=>{if(e.t==='inc')inc+=+e.a||0;else varExp+=+e.a||0});
    }
    const uk=`${SUM_YR}-${mo}`,ut=D.util[uk]||{};
    const utT=(+ut.eC||0)+(+ut.gC||0)+(+ut.wC||0);
    const hasUtil=utT>0;
    // Only apply fixed costs to months that have any recorded activity
    const active=hasEntry||hasUtil||inc>0;
    const fx=active?fxTotal():0;
    const tE=varExp+fx+utT;
    rows.push({mo:mo+1,inc,exp:tE,bal:inc-tE,active});
  }
  const ys=rows.filter(r=>r.active).reduce((a,r)=>({inc:a.inc+r.inc,exp:a.exp+r.exp,bal:a.bal+r.bal}),{inc:0,exp:0,bal:0});

  var sumPg=document.getElementById('pg');
  let s='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  s+='<button style="background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 12px;font-size:14px;cursor:pointer" onclick="SUM_YR--;renderSum(document.getElementById(&quot;pg&quot;))">◀</button>';
  s+='<div style="font-size:16px;font-weight:700">'+SUM_YR+'年 まとめ</div>';
  s+='<button style="background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 12px;font-size:14px;cursor:pointer" onclick="SUM_YR++;renderSum(document.getElementById(&quot;pg&quot;))">▶</button>';
  s+='</div>';
  s+=`<div style="background:${ys.bal>=0?'var(--bll)':'var(--rl)'};border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;border:1px solid var(--bd)"><div style="font-size:12px;color:var(--txl)">${SUM_YR}年 年間収支</div><div style="font-size:22px;font-weight:800;color:${ys.bal>=0?'var(--b)':'var(--r)'}">${fmt(ys.bal)}円</div></div>`;

  s+='<div style="border-radius:10px;border:1px solid var(--bd);overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:13px;background:var(--cd);table-layout:fixed">';
  s+='<colgroup><col style="width:14%"><col style="width:29%"><col style="width:29%"><col style="width:28%"></colgroup>';
  s+='<thead><tr style="background:var(--b);color:#fff"><th style="padding:8px 4px;text-align:center">月</th><th style="padding:8px 4px;text-align:right;padding-right:10px">収入</th><th style="padding:8px 4px;text-align:right;padding-right:10px">支出</th><th style="padding:8px 4px;text-align:right;padding-right:10px">収支</th></tr></thead><tbody>';
  rows.forEach(r=>{
    s+=`<tr style="border-top:1px solid #f3f4f6">`;
    s+=`<td style="padding:7px 4px;font-weight:600;text-align:center">${r.mo}月</td>`;
    s+=`<td style="padding:7px 10px 7px 4px;text-align:right;color:${r.inc>0?'var(--g)':'var(--txl)'}">${r.inc>0?fmt(r.inc):'-'}</td>`;
    s+=`<td style="padding:7px 10px 7px 4px;text-align:right">${r.active&&r.exp>0?fmt(r.exp):'-'}</td>`;
    s+=`<td style="padding:7px 10px 7px 4px;text-align:right;font-weight:600;color:${!r.active?'var(--txl)':r.bal<0?'var(--r)':'var(--b)'}">${r.active?fmt(r.bal):'-'}</td></tr>`;
  });
  s+=`<tr style="background:var(--bg);font-weight:700"><td style="padding:7px 4px;text-align:center">年計</td><td style="padding:7px 10px 7px 4px;text-align:right;color:var(--g)">${fmt(ys.inc)}</td><td style="padding:7px 10px 7px 4px;text-align:right">${fmt(ys.exp)}</td><td style="padding:7px 10px 7px 4px;text-align:right;color:${ys.bal<0?'var(--r)':'var(--b)'}">${fmt(ys.bal)}</td></tr>`;
  s+='</tbody></table></div>';

  const mx=Math.max(...rows.filter(r=>r.active).map(r=>Math.max(r.inc,r.exp)),1);
  s+='<div style="margin-top:14px"><div style="display:flex;gap:8px;font-size:10px;color:var(--txl);margin-bottom:4px">';
  s+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;background:var(--g);border-radius:2px"></span>収入</span>';
  s+='<span style="display:flex;align-items:center;gap:3px"><span style="width:8px;height:8px;background:var(--o);border-radius:2px"></span>支出</span></div>';
  s+='<div style="display:flex;align-items:flex-end;gap:2px;height:100px">';
  rows.forEach(r=>{
    s+=`<div style="flex:1;display:flex;gap:1px;align-items:flex-end;height:100%"><div style="flex:1;background:var(--g);border-radius:2px 2px 0 0;height:${r.inc/mx*100}%"></div><div style="flex:1;background:var(--o);border-radius:2px 2px 0 0;height:${r.exp/mx*100}%"></div></div>`;
  });
  s+='</div><div style="display:flex;gap:2px">';
  rows.forEach(r=>s+=`<div style="flex:1;text-align:center;font-size:9px;color:var(--txl)">${r.mo}</div>`);
  s+='</div></div>';
  pg.innerHTML=s;
}

  {pose:'happy',tab:0,title:'準備OK',msg:'お疲れさまでした。\n\n<strong>家計管理はコツコツ続けることが大切です。</strong>\n無理せず、楽しみながら続けていきましょう。\n\n一緒に頑張りましょうね。'}
];
let TUT_STEP=0;

function startTutorial(){
  TUT_STEP=0;
  renderTutorial();
}
function renderTutorial(){
  const t=TUT[TUT_STEP];
  if(t.tab!==null&&TAB!==t.tab){TAB=t.tab;render()}
  const isLast=TUT_STEP===TUT.length-1;
  let s='<div class="tut-bg" id="tutBg"><div class="tut">';
  s+='<div class="tut-head">';
  s+='<img src="'+CHAR[t.pose]+'">';
  s+='<div class="tut-bubble"><div class="tn">倉橋アンナ</div><div class="tm">'+t.msg+'</div></div>';
  s+='</div>';
  s+='<div class="tut-actions">';
  if(!isLast)s+='<button type="button" class="tut-skip" data-tut="skip">スキップ</button>';
  s+='<button type="button" class="tut-next" data-tut="next">'+(isLast?'はじめる':'次へ →')+'</button>';
  s+='</div>';
  s+='<div class="tut-progress">';
  for(let i=0;i<TUT.length;i++)s+='<span class="'+(i===TUT_STEP?'on':'')+'"></span>';
  s+='</div>';
  s+='</div></div>';
  document.getElementById('mr').innerHTML=s;
  // Attach listener
  const bg=document.getElementById('tutBg');
  if(bg){
    bg.addEventListener('click',function(ev){
      const t2=ev.target.closest('[data-tut]');
      if(!t2)return;
      const act=t2.getAttribute('data-tut');
      if(act==='next'){
        if(TUT_STEP<TUT.length-1){TUT_STEP++;renderTutorial()}
        else{endTutorial()}
      }else if(act==='skip'){endTutorial()}
    });
  }
}
function endTutorial(){
  try{localStorage.setItem(TUT_KEY,'1')}catch{}
  document.getElementById('mr').innerHTML='';
  TAB=0;render();
}
